# Server configuration
server.port=8080

# Spring application name
spring.application.name=TrashCashCampus

# Disable JPA auto-configuration since we're using Firebase/Firestore
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Firebase configuration
firebase.database.url=${FIREBASE_DATABASE_URL:https://trashcash-default-rtdb.firebaseio.com}
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:classpath:firebase-service-account.json}

# Firebase Retry Configuration
firebase.retry.max-attempts=3
firebase.retry.initial-delay=1000
firebase.operation.timeout=5000

# Logging settings
logging.level.com.TrashCashCampus=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=INFO

# Spring Security (temporary credentials for dev)
spring.security.user.name=user
spring.security.user.password=123

# Error handling
server.error.include-stacktrace=never

# Allow bean overriding (useful for testing)
spring.main.allow-bean-definition-overriding=true

# Add detailed request logging
logging.level.org.apache.http=DEBUG
logging.level.http.wire=DEBUG