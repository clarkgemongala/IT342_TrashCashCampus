# Server configuration
server.port=8080

# Spring application name
spring.application.name=TrashCashCampus

# Disable JPA auto-configuration since we're using Firebase/Firestore
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Logging settings
logging.level.com.TrashCashCampus=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Spring Security (temporary credentials for dev)
spring.security.user.name=user
spring.security.user.password=123

# Error handling
server.error.include-stacktrace=never

# Allow bean overriding (useful for testing)
spring.main.allow-bean-definition-overriding=true