# Production configuration for Render deployment
# Server configuration - Let Render assign the port
server.port=${PORT:8080}

# Spring application name
spring.application.name=TrashCashCampus

# Disable JPA auto-configuration since we're using Firebase/Firestore
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration

# Firebase configuration
firebase.credentials.path=trashcashcampusmobile-firebase-adminsdk-fbsvc-0a3b17cdcd.json

# Logging settings (reduced for production)
logging.level.com.TrashCashCampus=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO

# Enable HTTPS and secure cookies
server.ssl.enabled=true
server.tomcat.remoteip.remote-ip-header=x-forwarded-for
server.tomcat.remoteip.protocol-header=x-forwarded-proto

# Error handling - don't expose stack traces
server.error.include-stacktrace=never

# CORS configuration for web client
spring.web.cors.allowed-origins=https://trashcashcampus-web.onrender.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Rate limiting (if needed)
# app.ratelimit.enabled=true
# app.ratelimit.limit=100
# app.ratelimit.refresh-period=60
# app.ratelimit.timeout=5

# Set Spring Boot profile
spring.profiles.active=prod 